# Local development stack for Swyftstack.
#
# `docker compose up -d postgres`            -> just the control-plane DB (default,
#                                               recommended for fast FE dev).
# `docker compose --profile customer-db up`  -> + a separate customer Postgres.
# `docker compose --profile apps up`         -> + admin, user app and worker
#                                               (no Dockerfiles; runs via node).
services:
  postgres:
    image: postgres:16
    container_name: swyftstack-postgres
    environment:
      POSTGRES_USER: swyftstack
      POSTGRES_PASSWORD: 1baFhoZVXqQ9SZ9m
      POSTGRES_DB: swyftstack_control
    ports:
      - "5432:5432"
    volumes:
      - swyftstack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swyftstack"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional dedicated customer Postgres. Register it as a database_cluster
  # from the admin Infrastructure page (NOT via env vars).
  customer-postgres:
    image: postgres:16
    container_name: swyftstack-customer-postgres
    profiles: ["customer-db"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1baFhoZVXqQ9SZ9m
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - swyftstack_customer_pgdata:/var/lib/postgresql/data

  admin:
    image: node:20
    profiles: ["apps"]
    working_dir: /app
    command: sh -c "npm install && npm run db:generate && npm run dev:admin"
    environment:
      DATABASE_URL: "postgresql://swyftstack:1baFhoZVXqQ9SZ9m@postgres:5432/swyftstack_control?schema=public"
    env_file: [.env]
    ports: ["3000:3000"]
    volumes: ["./:/app"]
    depends_on:
      postgres: { condition: service_healthy }

  userapp:
    image: node:20
    profiles: ["apps"]
    working_dir: /app
    command: sh -c "npm install && npm run dev:user"
    env_file: [.env]
    environment:
      DATABASE_URL: "postgresql://swyftstack:1baFhoZVXqQ9SZ9m@postgres:5432/swyftstack_control?schema=public"
    ports: ["3001:3001"]
    volumes: ["./:/app"]
    depends_on:
      postgres: { condition: service_healthy }

  worker:
    image: node:20
    profiles: ["apps"]
    working_dir: /app
    command: sh -c "npm install && npm run db:generate && npm run dev:worker"
    env_file: [.env]
    environment:
      DATABASE_URL: "postgresql://swyftstack:1baFhoZVXqQ9SZ9m@postgres:5432/swyftstack_control?schema=public"
    volumes: ["./:/app"]
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  swyftstack_pgdata:
  swyftstack_customer_pgdata:
